<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        
        body {
            background-color: #f9f4ee; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 35px;
            color: #000;
        }

        .input-field {
         
            margin-bottom: 20px;
        }

        .input-field label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-field input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        .input-field input:focus {
            border-color: #c5a059;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background-color: #1a1a1a; 
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .footer-link {
            margin-top: 25px;
        }

        .footer-link a {
            color: #bfa37e;
            text-decoration: none;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Login</h2>
        
        <form>
            <div class="input-field">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>
            
            <div class="input-field">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        
        <div class="footer-link">
            <a onclick="window.history.back()">← Back to Store</a>
        </div>
    </div>

    <script>
        
        console.log("Login page is ready!");
    </script>

</body>
</html>
